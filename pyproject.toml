[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"


[project]
name = "hyperherd"
version = "0.1.0"
description = "Launch and monitor hyperparameter optimization job arrays on SLURM"
readme = "README.md"
requires-python = ">=3.8"
dependencies = ["pyyaml", "pydantic>=2.0"]

[project.scripts]
herd = "hyperherd.cli:main"