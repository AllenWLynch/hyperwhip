name: Publish to PyPI

# Fires when a `vMAJOR.MINOR.PATCH` (or pre-release like `v0.2.0rc1`) tag
# is pushed. The build derives the version from the tag via
# setuptools_scm — there's nothing to bump in pyproject.toml.
#
# Cutting a release:
#   git tag -a v0.1.0 -m "first release"
#   git push origin v0.1.0
#
# This workflow uses PyPI's Trusted Publisher (OIDC), not an API token.
# One-time setup on PyPI: create the project (or register the name with
# a placeholder version), then in the project's "Publishing" settings
# add a trusted publisher entry pointing at:
#   - Owner:  AllenWLynch
#   - Repository: hyperherd
#   - Workflow:  publish.yml
#   - Environment: pypi
# After that, every tagged push publishes without a stored secret.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write   # required for trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hyperherd
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm needs the full history (and the tag) to derive
          # the version. Default checkout is shallow.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify the version matches the tag
        run: |
          python -m pip install --quiet dist/*.whl
          BUILT_VERSION=$(python -c "from importlib.metadata import version; print(version('hyperherd'))")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: $TAG_VERSION"
          echo "Built: $BUILT_VERSION"
          if [ "$BUILT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Built version ($BUILT_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
