name: mock_sweep

grid: all

slurm:
  partition: default
  time: "00:30:00"
  mem: "1G"
  cpus_per_task: 1
  extra_args:
    - "--mail-user=allen.lynch@ucsd.edu"
    - "--mail-type=END,FAIL"

launcher: ./launch.sh

hydra:
  static_overrides:
    - "num_epochs=5"
    - "sleep_per_epoch=2"
    - "failure_probability=0.3"

parameters:
  learning_rate:
    abbrev: lr
    type: discrete
    values: [0.01, 0.001, 0.0001]
  optimizer:
    abbrev: opt
    type: discrete
    values: [adam, sgd]
  batch_size:
    abbrev: bs
    type: discrete
    values: [32, 64]
