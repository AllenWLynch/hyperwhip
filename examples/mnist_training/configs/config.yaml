# Hydra base config for MNIST classifier

# Overridden by HyperHerd per-trial:
learning_rate: 0.001
optimizer: adam
batch_size: 64
hidden_dim: 128
dropout: 0.0

# Set by HyperHerd:
experiment_name: default

# Training settings (constant across sweep, or set via static_overrides):
max_epochs: 10
data_dir: ./data
num_workers: 4
accelerator: auto    # "auto" uses GPU if available, else CPU
